deploy:
  stage: deploy
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - chmod +x ./frontend/deploy.sh
  script:
    # Копируем конфиг nginx на виртуалку
    - scp ./frontend/sausage-store-frontend.conf ${DEV_USER}@${DEV_HOST}:/home/${DEV_USER}/sausage-store-frontend.conf
    # Копируем архив на сервер
    - scp ./frontend/sausage-store-${VERSION}.tar.gz ${DEV_USER}@${DEV_HOST}:/home/${DEV_USER}/
    # Запускаем скрипт деплоя
    - ssh ${DEV_USER}@${DEV_HOST} "
      export VERSION=${VERSION} &&
      export NEXUS_REPO_URL=${NEXUS_REPO_URL} &&
      export NEXUS_REPO_FRONTEND_NAME=${NEXUS_REPO_FRONTEND_NAME} &&
      export NEXUS_REPO_USER=${NEXUS_REPO_USER} &&
      export NEXUS_REPO_PASS=${NEXUS_REPO_PASS} &&
      /bin/bash -s" < ./frontend/deploy.sh
  rules:
    - changes:
        - frontend/**/*
  dependencies:
    - release
