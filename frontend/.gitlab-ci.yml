cache:
  paths:
    - frontend/node_modules/

variables:
  FRONTEND_DIR: "sausage-store-frontend"
  VERSION: 1.0.4

stages:
  - build
  - test
  - release
  - deploy

build:
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    changes:
      - frontend/**/*

sonarqube-frontend-sast:
  stage: test
  script:
    - cd $FRONTEND_DIR
    - npx sonar-scanner
      -Dsonar.projectKey=$SONAR_PROJECT_KEY_FRONT
      -Dsonar.sources=.
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_LOGIN_FRONT
  needs:
    - build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - $FRONTEND_DIR/**/*
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $FRONTEND_DIR/**/*
      when: on_success

release:
  stage: release
  only:
    changes:
      - frontend/**/*
  script:
    # Проверяем структуру
    - echo "=== Contents of frontend/dist ==="
    - ls -la frontend/dist/

    - echo "=== Contents of frontend/dist/frontend ==="
    - ls -la frontend/dist/frontend/

    # Создаем архив из содержимого правильной директории
    - cd frontend/dist/frontend
    - tar czvf ../../../sausage-store-${VERSION}.tar.gz *
    - cd ../../..

    # Проверяем содержимое архива
    - echo "=== Archive contents ==="
    - tar tvf sausage-store-${VERSION}.tar.gz

    # Загружаем в Nexus
    - echo "=== Uploading to Nexus ==="
    - >
      curl -v -u "${NEXUS_REPO_USER}:${NEXUS_REPO_PASS}"
      --upload-file sausage-store-${VERSION}.tar.gz
      ${NEXUS_REPO_URL}/${NEXUS_REPO_FRONTEND_NAME}/${VERSION}/sausage-store-${VERSION}.tar.gz

