cache:
  paths:
    - ${CI_PROJECT_DIR}/.m2/repository

variables:
  VERSION: 1.0.3
  MAVEN_REPO_PATH: ${CI_PROJECT_DIR}/.m2/repository
  JAVA_OPTS: -XX:MaxRAMPercentage=90

stages:
  - build
  - test
  - release
  - deploy

build:
  stage: build
  script:
    - cd backend
    - >
      mvn package
      -Dversion.application=${VERSION}
      -Dmaven.repo.local=${MAVEN_REPO_PATH}
  rules:
    - changes:
        - backend/**/*

sonarqube-backend-sast:
  stage: test
  image: maven:3.8-openjdk-16
  script:
    - cd $BACKEND_DIR
    - mvn verify sonar:sonar -Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository
      -Dsonar.projectKey=$SONAR_PROJECT_KEY
      -Dsonar.projectName=$SONAR_PROJECT_NAME
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_LOGIN
      -Dsonar.java.binaries=target/classes
      -Dsonar.qualitygate.wait=true
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"
  needs:
    - build
  cache:
    paths:
      - .m2/repository
    policy: pull
  artifacts:
    reports:
      sast: gl-sast-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - $BACKEND_DIR/**/*
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $BACKEND_DIR/**/*
      when: on_success

release:
  stage: release
  script:
    - cd backend
    - >
      mvn deploy -DskipTests -s settings.xml
      -Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository
      -s settings.xml -Dversion.application=${VERSION}
  rules:
    - changes:
        - backend/**/*

deploy:
  stage: deploy
  before_script:
    # Установка SSH-клиента
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    # Сохраняем приватный ключ в файл
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Сохраняем ключ как есть (OpenSSH формат)
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_openssh
    - chmod 600 ~/.ssh/id_openssh
    # Показываем первые 2 строки ключа для проверки
    - echo "=== Key check (first 2 lines) ==="
    - head -2 ~/.ssh/id_openssh
    # Добавляем известные хосты
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    # Даём права на выполнение скрипта деплоя
    - chmod +x ./backend/deploy.sh
    # ТЕСТ: проверка подключения
    - echo "Testing SSH connection..."
    - ssh -o BatchMode=yes -i ~/.ssh/id_openssh -v ${DEV_USER}@${DEV_HOST} "echo 'SSH connection successful'" || true
  script:
    # Копируем systemd unit-файл на виртуалку
    - scp -i ~/.ssh/id_openssh ./backend/sausage-store-backend.service ${DEV_USER}@${DEV_HOST}:/home/${DEV_USER}/sausage-store-backend.service
    # Запускаем скрипт деплоя
    - ssh -i ~/.ssh/id_openssh ${DEV_USER}@${DEV_HOST} "
      export VERSION=${VERSION} &&
      export NEXUS_REPO_URL=${NEXUS_REPO_URL} &&
      export NEXUS_REPO_BACKEND_NAME=${NEXUS_REPO_BACKEND_NAME} &&
      export NEXUS_REPO_USER=${NEXUS_REPO_USER} &&
      export NEXUS_REPO_PASS=${NEXUS_REPO_PASS} &&
      /bin/bash -s" < ./backend/deploy.sh
  rules:
    - changes:
        - backend/**/*
